name: Debug Build Windows EXE

on:
  workflow_dispatch:

jobs:
  debug-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Show env and versions
        run: |
          python -V
          pip -V
          pip list
          pyinstaller --version || echo "pyinstaller not installed yet"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyinstaller

      - name: Verify files in repo
        run: |
          echo "Repo files:"
          dir /B /S
          echo "Contents of current dir:"
          powershell -Command "Get-ChildItem -Force | Format-List"

      - name: Build with PyInstaller (debug)
        continue-on-error: true
        run: |
          pyinstaller --clean --noconfirm --onefile --log-level=DEBUG --console post_sender_with_token.py || echo "pyinstaller exit code=$?"
      
      - name: List build output
        run: |
          echo "Dist dir:"
          if exist dist (dir dist /B /S) else echo "dist not found"
          echo "Build dir:"
          if exist build (dir build /B /S) else echo "build not found"
          echo "Spec file:"
          if exist post_sender_with_token.spec (type post_sender_with_token.spec) else echo "spec not found"

      - name: Upload build logs and folders
        uses: actions/upload-artifact@v4
        with:
          name: debug-build-output
          path: |
            dist/
            build/
            post_sender_with_token.spec
            /home/runner/work/*/pyinstaller.log
