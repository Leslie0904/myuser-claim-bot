name: Build and release Windows exe (improved)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# 允许 GITHUB_TOKEN 有写权限（创建 Release / 上传资产）
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install/upgrade PyInstaller
        run: |
          pip install --upgrade pyinstaller

      - name: Sanity check Python syntax
        id: syntax
        run: |
          echo "=== python -m py_compile claim_bot.py ===" > build.log
          python -m py_compile claim_bot.py 2>> build.log || echo "PYTHON_COMPILE_FAILED" >> build.log

      - name: Build exe with PyInstaller (capture logs)
        id: build
        run: |
          echo "=== pyinstaller start ===" >> build.log
          pyinstaller --onefile --windowed --name claim_bot claim_bot.py >> build.log 2>&1 || echo "PYINSTALLER_FAILED" >> build.log

      - name: List dist folder and show build log tail
        run: |
          dir dist || echo "dist folder not found" >> build.log
          echo "=== build.log tail ===" >> build.log
          powershell -Command "Get-Content build.log -Tail 200 | Out-File -FilePath build_tail.log -Encoding utf8"
          type build_tail.log

      - name: Upload build log as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            build_tail.log

      - name: Check if exe exists
        id: check_exe
        shell: pwsh
        run: |
          if (Test-Path 'dist\\claim_bot.exe') {
            echo "exe_exists=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "exe_exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release (only if exe exists)
        if: steps.check_exe.outputs.exe_exists == 'true'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_id }}
          release_name: Build ${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Upload release asset (only if exe exists)
        if: steps.check_exe.outputs.exe_exists == 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist\\claim_bot.exe
          asset_name: claim_bot.exe
          asset_content_type: application/octet-stream

      - name: Upload dist folder as artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist
